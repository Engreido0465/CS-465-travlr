<div class="container py-4">
  <h2 class="mb-3">Add Trip</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <form (ngSubmit)="save()" #f="ngForm" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Name</label>
      <input class="form-control" [(ngModel)]="trip.name" name="name" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Length (days)</label>
      <input type="number" class="form-control" [(ngModel)]="trip.length" name="length" min="1" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Start</label>
      <input type="date" class="form-control" [(ngModel)]="trip.start" name="start" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Price</label>
      <input type="number" class="form-control" [(ngModel)]="trip.price" name="price" min="0" required>
    </div>

    <div class="col-md-9">
      <label class="form-label">Image filename</label>
      <input class="form-control" [(ngModel)]="trip.image" name="image">
    </div>

    <div class="col-12">
      <label class="form-label">Description</label>
      <textarea class="form-control" rows="3" [(ngModel)]="trip.description" name="description"></textarea>
    </div>

    <div class="col-12">
      <label class="form-label">Description 2</label>
      <textarea class="form-control" rows="3" [(ngModel)]="trip.description2" name="description2"></textarea>
    </div>

    <div class="col-12">
      <button class="btn btn-success" [disabled]="saving || f.invalid">Create</button>
      <a routerLink="/trips" class="btn btn-secondary ms-2">Cancel</a>
    </div>
  </form>
</div>
