<div class="container">
  <h2>Register</h2>
  <div class="form-group">
    <label for="name">Name</label>
    <input id="name" class="form-control" [(ngModel)]="user.name" placeholder="Enter Name" />
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input id="email" class="form-control" [(ngModel)]="user.email" placeholder="Enter Email Address" />
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input id="password" type="password" class="form-control" [(ngModel)]="password" placeholder="Enter Password" />
  </div>

  <button class="btn btn-primary mt-3" (click)="onRegister()">Register</button>
</div>
