<div class="container mt-4">
  <h2>Edit Trip</h2>

  <!-- Success or error message -->
  <div *ngIf="message" class="alert alert-info mt-3">
    {{ message }}
  </div>

  <!-- Edit Trip Form -->
  <form #tripForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="form-group mb-3">
      <label for="code">Trip Code</label>
      <input
        type="text"
        id="code"
        name="code"
        [(ngModel)]="trip.code"
        class="form-control"
        readonly
      />
    </div>

    <div class="form-group mb-3">
      <label for="name">Trip Name</label>
      <input
        type="text"
        id="name"
        name="name"
        [(ngModel)]="trip.name"
        class="form-control"
        required
      />
    </div>

    <div class="form-group mb-3">
      <label for="resort">Resort</label>
      <input
        type="text"
        id="resort"
        name="resort"
        [(ngModel)]="trip.resort"
        class="form-control"
        required
      />
    </div>

    <div class="form-group mb-3">
      <label for="length">Length (nights)</label>
      <input
        type="number"
        id="length"
        name="length"
        [(ngModel)]="trip.length"
        class="form-control"
        required
      />
    </div>

    <div class="form-group mb-3">
      <label for="start">Start Date</label>
      <input
        type="date"
        id="start"
        name="start"
        [(ngModel)]="trip.start"
        class="form-control"
        required
      />
    </div>

    <div class="form-group mb-3">
      <label for="perPerson">Price per Person</label>
      <input
        type="number"
        id="perPerson"
        name="perPerson"
        [(ngModel)]="trip.perPerson"
        class="form-control"
        required
      />
    </div>

    <div class="form-group mb-3">
      <label for="image">Image URL</label>
      <input
        type="text"
        id="image"
        name="image"
        [(ngModel)]="trip.image"
        class="form-control"
      />
    </div>

    <div class="form-group mb-3">
      <label for="description">Description</label>
      <textarea
        id="description"
        name="description"
        [(ngModel)]="trip.description"
        class="form-control"
        rows="3"
      ></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <button type="button" class="btn btn-secondary ms-2" (click)="router.navigate(['/'])">
      Cancel
    </button>
  </form>
</div>
