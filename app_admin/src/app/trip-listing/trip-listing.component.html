<div class="container mt-4">
  <h2>Trips</h2>

  <!-- Add Trip button (only visible if logged in) -->
  <div *ngIf="isLoggedIn()" class="mb-3">
    <button class="btn btn-primary" routerLink="/add-trip">Add Trip</button>
  </div>

  <!-- Message display -->
  <div *ngIf="message" class="alert alert-info">
    {{ message }}
  </div>

  <!-- Trips list -->
  <div class="row mt-4">
    <div class="col-md-4 mb-4" *ngFor="let trip of trips">
      <app-trip-card [trip]="trip"></app-trip-card>
    </div>
  </div>
</div>
